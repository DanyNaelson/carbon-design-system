# ─── SonarQube Configuration ───
sonar.projectKey=yourorg-design-system
sonar.projectName=@yourorg/design-system
sonar.projectVersion=0.1.0

# Source & test paths
sonar.sources=packages/design-system/src,packages/store-engine/src,packages/mcp-adapter/src,packages/ai-bridge/src
sonar.tests=packages/design-system/src,packages/store-engine/src,packages/mcp-adapter/src,packages/ai-bridge/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.config.ts,**/*.setup.ts

# TypeScript / JavaScript
sonar.typescript.lcov.reportPaths=packages/design-system/coverage/lcov.info,packages/store-engine/coverage/lcov.info,packages/mcp-adapter/coverage/lcov.info,packages/ai-bridge/coverage/lcov.info

# Coverage thresholds (Quality Gate)
sonar.coverage.exclusions=**/index.ts,**/types.ts,**/*.test.ts,**/*.test.tsx,**/*.config.ts,**/*.setup.ts

# Encoding
sonar.sourceEncoding=UTF-8

# Duplication
sonar.cpd.exclusions=**/types.ts,**/tokens/**,**/themes/**
